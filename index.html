<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IF BUU Exam Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --apple: #000000;
            --google: #ea4335;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Noto Sans Thai', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, hsla(225,39%,30%,0.02) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,20%,0.02) 0, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-main);
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-header {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        h1 { 
            font-weight: 700;
            color: var(--text-main); 
            margin: 0 0 0.75rem 0; 
            font-size: 1.75rem;
            letter-spacing: -0.02em;
        }

        p { 
            line-height: 1.6; 
            color: var(--text-sub); 
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        
        .input-group {
            margin-bottom: 1.75rem;
            position: relative;
        }

        .input-label {
            display: block;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 0.5rem;
            margin-left: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-size: 1.25rem;
            text-align: center;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f1f5f9;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        input::placeholder { color: #cbd5e1; }
        
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.1rem;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 600;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }

        .btn-apple { 
            background: var(--apple); 
        }

        .btn-google { 
            background: var(--google);
        }

        .btn:disabled, .btn[disabled] {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
            pointer-events: none; /* Block all clicks */
        }
        
        .btn svg { 
            margin-right: 12px; 
            width: 20px; 
            height: 20px; 
            fill: currentColor; 
        }

        .instruction {
            margin-top: 2rem;
            text-align: left;
            font-size: 0.8rem;
            background: #f3f3f3;
            padding: 1.25rem;
            border-radius: 14px;
            color: #92400e;
            line-height: 1.5;
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .card { padding: 2rem 1.5rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>IF BUU Exam Sync</h1>
        <p>เชื่อมต่อตารางสอบ Informatics BUU <br>เข้าปฎิทินของคุณ</p>
        
        <div class="input-group">
            <span class="input-label">Student ID / รหัสนิสิต</span>
            <input type="number" id="std_id" placeholder="Ex. 67160XXX" maxlength="8">
        </div>

        <div class="btn-container">
            <a id="apple_link" class="btn btn-apple" disabled>
                Add to Apple Calendar
            </a>
            <a id="google_link" class="btn btn-google" target="_blank" disabled>
                Add to Google Calendar
            </a>
        </div>

        <div class="instruction">
            Apple Calendar: โปรดเลือก "Subscribe" หรือ "สมัครรับ" เพื่อให้ตารางสอบอัปเดตอัตโนมัติเมื่อมีการเปลี่ยนแปลงจากทางคณะ
        </div>


        <div class="footer">
            Develop by Papangkorn Pitjawong
        </div>
    </div>

    <script>
        const input = document.getElementById('std_id');
        const appleLink = document.getElementById('apple_link');
        const googleLink = document.getElementById('google_link');

        function updateLinks() {
            const sid = input.value.trim();
            const host = window.location.host;
            const originWithProtocol = window.location.origin; // e.g. https://...
            
            if (sid.length >= 8) {
                // Construct full URLs with /std/ prefix
                const fullIcsUrl = originWithProtocol + '/std/' + sid;
                
                // Google takes some time to refresh, so we add a timestamp to force it
                const googleIcsUrl = fullIcsUrl + '?v=' + Date.now();
                
                appleLink.href = 'webcal://' + host + '/std/' + sid;
                googleLink.href = 'https://www.google.com/calendar/render?cid=' + encodeURIComponent(googleIcsUrl);
                
                appleLink.removeAttribute('disabled');
                googleLink.removeAttribute('disabled');
            } else {
                appleLink.href = "javascript:void(0)";
                appleLink.setAttribute('disabled', 'true');
                
                googleLink.href = "javascript:void(0)";
                googleLink.setAttribute('disabled', 'true');
            }
        }

        input.addEventListener('input', updateLinks);
        updateLinks(); // Initial state
    </script>
</body>
</html>
